<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realistic Woodsman RPG</title>
  <style>
    :root {
      --bg: #111814;
      --panel: #1b261f;
      --panel2: #223127;
      --text: #eef5ee;
      --muted: #aab7aa;
      --accent: #9dd67c;
      --danger: #e77878;
      --warn: #e6c66a;
      --line: #334336;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1b2c21, var(--bg));
      color: var(--text);
      line-height: 1.35;
    }

    header {
      padding: 18px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(10, 16, 12, 0.85);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 6px 0;
      font-size: 1.45rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.92rem;
    }

    main {
      padding: 14px;
      max-width: 980px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 760px) {
      .grid { grid-template-columns: 1fr 1fr; }
      .wide { grid-column: 1 / -1; }
    }

    section {
      background: rgba(27, 38, 31, 0.96);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    h2 {
      margin: 0 0 10px 0;
      font-size: 1.05rem;
      color: var(--accent);
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .row:last-child { border-bottom: none; }

    .label { color: var(--muted); }
    .value { text-align: right; font-weight: 650; }

    .bar-wrap {
      margin: 9px 0 12px;
    }

    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      margin-bottom: 4px;
      color: var(--muted);
    }

    .bar {
      height: 13px;
      background: #0b100d;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, #7bc96f, #c9e97d);
      transition: width 0.25s;
    }

    .danger .fill { background: linear-gradient(90deg, #c94d4d, #e77878); }
    .warn .fill { background: linear-gradient(90deg, #c98d37, #e6c66a); }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    @media (min-width: 560px) {
      .actions { grid-template-columns: 1fr 1fr; }
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--text);
      border-radius: 12px;
      padding: 12px;
      font-weight: 750;
      font-size: 0.95rem;
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
    }

    button.primary {
      background: #2f5737;
      border-color: #5f9f62;
    }

    button.danger {
      background: #4a2323;
      border-color: #8b4a4a;
    }

    .small-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .small-buttons button {
      padding: 9px 10px;
      font-size: 0.85rem;
    }

    .list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .pill {
      background: #101711;
      border: 1px solid var(--line);
      padding: 7px 9px;
      border-radius: 999px;
      color: var(--text);
      font-size: 0.9rem;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
    }

    #log {
      max-height: 320px;
      overflow-y: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.86rem;
      background: #0b100d;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid var(--line);
    }

    .log-line {
      margin-bottom: 7px;
      color: #d8e7d8;
    }

    .bad { color: var(--danger); }
    .good { color: var(--accent); }
    .note { color: var(--warn); }

    footer {
      color: var(--muted);
      text-align: center;
      padding: 18px 10px 30px;
      font-size: 0.82rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Realistic Woodsman RPG</h1>
    <div class="subtitle">No upgrade shop. No fake gear scores. Survive by time, materials, weather, and learned skill.</div>
    <div class="small-buttons">
      <button onclick="saveGame()">Manual Save</button>
      <button class="danger" onclick="resetGame()">Reset World</button>
    </div>
  </header>

  <main class="grid">
    <section>
      <h2>World</h2>
      <div class="row"><span class="label">Day</span><span class="value" id="day"></span></div>
      <div class="row"><span class="label">Time</span><span class="value" id="time"></span></div>
      <div class="row"><span class="label">Weather</span><span class="value" id="weather"></span></div>
      <div class="row"><span class="label">Temperature</span><span class="value" id="temp"></span></div>
      <div class="row"><span class="label">Location</span><span class="value" id="location"></span></div>
    </section>

    <section>
      <h2>Body</h2>
      <div id="bodyBars"></div>
    </section>

    <section>
      <h2>Inventory</h2>
      <div id="inventory" class="list"></div>
    </section>

    <section>
      <h2>Skills</h2>
      <div id="skills" class="list"></div>
    </section>

    <section class="wide">
      <h2>Actions</h2>
      <div class="actions">
        <button class="primary" onclick="doAction('observe')">Observe Area — 10 min</button>
        <button onclick="doAction('sticks')">Gather Sticks — 15 min</button>
        <button onclick="doAction('stones')">Search for Stones — 20 min</button>
        <button onclick="doAction('fiber')">Pull Fiber / Dry Grass — 20 min</button>
        <button onclick="doAction('water')">Look for Water — 30 min</button>
        <button onclick="doAction('fire')">Attempt Fire — 30 min</button>
        <button onclick="doAction('shelter')">Work on Lean-To — 45 min</button>
        <button onclick="doAction('rest')">Rest — 30 min</button>
        <button onclick="doAction('sleep')">Sleep — 4 hours</button>
      </div>
    </section>

    <section class="wide">
      <h2>Log</h2>
      <div id="log"></div>
    </section>
  </main>

  <footer>Autosaves after every action. Built as a harsh survival prototype.</footer>

  <script>
    const defaultState = {
      day: 1,
      minutes: 8 * 60,
      weather: "Cool and overcast",
      temp: 58,
      location: "Old-growth forest edge",
      body: {
        health: 100,
        stamina: 80,
        hunger: 18,
        thirst: 22,
        warmth: 72,
        fatigue: 18
      },
      inv: {
        sticks: 0,
        stones: 0,
        fiber: 0,
        water: 0,
        ember: 0,
        fire: 0,
        shelter: 0
      },
      skills: {
        observation: { level: 0, xp: 0 },
        foraging: { level: 0, xp: 0 },
        campcraft: { level: 0, xp: 0 },
        firecraft: { level: 0, xp: 0 },
        woodcraft: { level: 0, xp: 0 }
      },
      log: [
        "You wake under wet trees with no tools, no shelter, and daylight bleeding away."
      ]
    };

    let state = loadGame() || structuredClone(defaultState);

    function structuredCloneFallback(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    if (typeof structuredClone === "undefined") {
      window.structuredClone = structuredCloneFallback;
    }

    function loadGame() {
      try {
        const raw = localStorage.getItem("woodsmanRPGSave");
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function saveGame() {
      localStorage.setItem("woodsmanRPGSave", JSON.stringify(state));
      addLog("Game saved.", "good", false);
      render();
    }

    function resetGame() {
      if (!confirm("Reset the world and erase this save?")) return;
      localStorage.removeItem("woodsmanRPGSave");
      state = structuredClone(defaultState);
      render();
    }

    function addLog(text, cls = "", autosave = true) {
      const stamp = `Day ${state.day}, ${formatTime(state.minutes)}`;
      state.log.unshift(`[${stamp}] ${text}`);
      state.log = state.log.slice(0, 80);
      if (autosave) localStorage.setItem("woodsmanRPGSave", JSON.stringify(state));
    }

    function formatTime(mins) {
      mins = mins % 1440;
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    }

    function passTime(minutes, effort = 1) {
      state.minutes += minutes;
      while (state.minutes >= 1440) {
        state.minutes -= 1440;
        state.day++;
        rollWeather();
      }

      state.body.hunger += minutes * 0.018 * effort;
      state.body.thirst += minutes * 0.025 * effort;
      state.body.fatigue += minutes * 0.018 * effort;
      state.body.stamina -= minutes * 0.08 * effort;

      if (state.weather.includes("Rain")) state.body.warmth -= minutes * 0.08;
      else if (state.temp < 50) state.body.warmth -= minutes * 0.045;
      else state.body.warmth -= minutes * 0.015;

      if (state.inv.fire > 0) state.body.warmth += minutes * 0.08;
      if (state.inv.shelter > 0) state.body.warmth += minutes * 0.025;

      clampBody();
      survivalDamage();
    }

    function clampBody() {
      for (const k in state.body) {
        state.body[k] = Math.max(0, Math.min(100, Math.round(state.body[k])));
      }
    }

    function survivalDamage() {
      let dmg = 0;
      if (state.body.hunger >= 95) dmg += 2;
      if (state.body.thirst >= 90) dmg += 4;
      if (state.body.warmth <= 10) dmg += 4;
      if (state.body.fatigue >= 95) dmg += 2;
      if (dmg > 0) {
        state.body.health = Math.max(0, state.body.health - dmg);
        addLog(`Your body is failing. Health -${dmg}.`, "bad");
      }
      if (state.body.health <= 0) {
        addLog("You collapse. This prototype does not yet handle death saves.", "bad");
      }
    }

    function rollWeather() {
      const options = [
        ["Cold clear morning", 46],
        ["Cool and overcast", 58],
        ["Damp wind", 52],
        ["Light rain", 49],
        ["Hard Rain", 44],
        ["Mild sun", 64]
      ];
      const pick = options[Math.floor(Math.random() * options.length)];
      state.weather = pick[0];
      state.temp = pick[1] + Math.floor(Math.random() * 7) - 3;
      addLog(`Weather changes: ${state.weather}, ${state.temp}°F.`, "note");
    }

    function gainSkill(name, xp) {
      const s = state.skills[name];
      if (!s) return;
      s.xp += xp;
      const needed = 25 + s.level * 15;
      if (s.xp >= needed) {
        s.xp -= needed;
        s.level++;
        addLog(`${title(name)} increased to level ${s.level}.`, "good");
      }
    }

    function title(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function chance(percent) {
      return Math.random() * 100 < percent;
    }

    function doAction(action) {
      if (state.body.health <= 0) {
        addLog("You are down. Reset the world to continue.", "bad");
        render();
        return;
      }

      if (state.body.stamina <= 5 && !["rest", "sleep"].includes(action)) {
        addLog("You are too exhausted to work. Rest or sleep.", "bad");
        render();
        return;
      }

      switch (action) {
        case "observe":
          passTime(10, 0.5);
          gainSkill("observation", 3);
          addLog("You study wind, slope, tree cover, game trails, and low ground. The forest starts to make more sense.");
          break;

        case "sticks":
          passTime(15, 1);
          const sticks = 1 + Math.floor(Math.random() * 3) + Math.floor(state.skills.foraging.level / 3);
          state.inv.sticks += sticks;
          gainSkill("foraging", 4);
          gainSkill("woodcraft", 2);
          addLog(`You gather ${sticks} usable sticks.`);
          break;

        case "stones":
          passTime(20, 1);
          const stones = chance(70 + state.skills.observation.level * 3) ? 1 + Math.floor(Math.random() * 2) : 0;
          state.inv.stones += stones;
          gainSkill("observation", 2);
          gainSkill("foraging", 3);
          addLog(stones ? `You find ${stones} workable stones.` : "You search the ground but find no useful stones.", stones ? "" : "note");
          break;

        case "fiber":
          passTime(20, 1);
          const fiber = 1 + Math.floor(Math.random() * 3);
          state.inv.fiber += fiber;
          gainSkill("foraging", 3);
          gainSkill("campcraft", 2);
          addLog(`You pull and sort ${fiber} bundles of dry grass/fiber.`);
          break;

        case "water":
          passTime(30, 1.1);
          const waterChance = 35 + state.skills.observation.level * 4 + state.skills.foraging.level * 2;
          if (chance(waterChance)) {
            state.inv.water += 1;
            state.body.thirst = Math.max(0, state.body.thirst - 18);
            gainSkill("observation", 5);
            gainSkill("foraging", 5);
            addLog("You find a small seep and drink carefully. Thirst drops.");
          } else {
            gainSkill("observation", 2);
            addLog("You fail to find safe water. Thirst worsens.", "bad");
          }
          break;

        case "fire":
          if (state.inv.sticks < 2 || state.inv.fiber < 1 || state.inv.stones < 1) {
            addLog("You need at least 2 sticks, 1 fiber, and 1 stone to make a serious fire attempt.", "bad");
            break;
          }
          passTime(30, 1.2);
          state.inv.sticks -= 2;
          state.inv.fiber -= 1;
          const fireChance = 25 + state.skills.firecraft.level * 6 + (state.weather.includes("Rain") ? -15 : 0);
          gainSkill("firecraft", 8);
          if (chance(fireChance)) {
            state.inv.fire = 1;
            state.body.warmth = Math.min(100, state.body.warmth + 25);
            addLog("Smoke catches, then flame. You have a small fire.", "good");
          } else {
            addLog("The tinder smokes, sputters, and dies. Materials spent.", "bad");
          }
          break;

        case "shelter":
          if (state.inv.sticks < 4 || state.inv.fiber < 2) {
            addLog("You need at least 4 sticks and 2 fiber to make real lean-to progress.", "bad");
            break;
          }
          passTime(45, 1.3);
          state.inv.sticks -= 4;
          state.inv.fiber -= 2;
          state.inv.shelter += 25 + state.skills.campcraft.level * 3;
          if (state.inv.shelter > 100) state.inv.shelter = 100;
          gainSkill("campcraft", 10);
          gainSkill("woodcraft", 4);
          addLog(`You improve the lean-to. Shelter is now ${state.inv.shelter}%.`, "good");
          break;

        case "rest":
          passTime(30, 0.2);
          state.body.stamina = Math.min(100, state.body.stamina + 22);
          state.body.fatigue = Math.max(0, state.body.fatigue - 8);
          addLog("You rest without sleeping. Stamina recovers a little.");
          break;

        case "sleep":
          passTime(240, 0.15);
          const shelterBonus = state.inv.shelter >= 50 ? 18 : 0;
          const fireBonus = state.inv.fire > 0 ? 12 : 0;
          state.body.stamina = Math.min(100, state.body.stamina + 55);
          state.body.fatigue = Math.max(0, state.body.fatigue - 38 - shelterBonus);
          state.body.warmth = Math.min(100, state.body.warmth + fireBonus);
          state.inv.fire = 0;
          addLog("You sleep in rough conditions. The fire is out by the time you wake.");
          break;
      }

      render();
    }

    function renderBars() {
      const bars = [
        ["health", "Health", false],
        ["stamina", "Stamina", false],
        ["hunger", "Hunger", true],
        ["thirst", "Thirst", true],
        ["warmth", "Warmth", false],
        ["fatigue", "Fatigue", true]
      ];

      document.getElementById("bodyBars").innerHTML = bars.map(([key, label, badHigh]) => {
        const val = state.body[key];
        let cls = "";
        if ((badHigh && val >= 75) || (!badHigh && val <= 25)) cls = "danger";
        else if ((badHigh && val >= 55) || (!badHigh && val <= 45)) cls = "warn";
        return `
          <div class="bar-wrap ${cls}">
            <div class="bar-label"><span>${label}</span><span>${val}/100</span></div>
            <div class="bar"><div class="fill" style="width:${val}%"></div></div>
          </div>
        `;
      }).join("");
    }

    function renderInventory() {
      const items = Object.entries(state.inv).filter(([k, v]) => v > 0);
      document.getElementById("inventory").innerHTML = items.length
        ? items.map(([k, v]) => `<span class="pill">${title(k)}: ${v}${k === "shelter" ? "%" : ""}</span>`).join("")
        : `<span class="empty">Nothing useful.</span>`;
    }

    function renderSkills() {
      document.getElementById("skills").innerHTML = Object.entries(state.skills)
        .map(([k, s]) => `<span class="pill">${title(k)} Lv ${s.level} · ${s.xp} XP</span>`)
        .join("");
    }

    function renderLog() {
      document.getElementById("log").innerHTML = state.log
        .map(line => `<div class="log-line">${line}</div>`)
        .join("");
    }

    function render() {
      document.getElementById("day").textContent = state.day;
      document.getElementById("time").textContent = formatTime(state.minutes);
      document.getElementById("weather").textContent = state.weather;
      document.getElementById("temp").textContent = `${state.temp}°F`;
      document.getElementById("location").textContent = state.location;
      renderBars();
      renderInventory();
      renderSkills();
      renderLog();
    }

    render();
  </script>
</body>
</html>
